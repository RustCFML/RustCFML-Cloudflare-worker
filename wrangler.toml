name = "rustcfml-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

# JSPI is enabled by default on the Workers runtime. No flag needed.

[build]
# ESBUILD_BIN points worker-build at our wrapper, which adds `--external:`
# flags so postgres.js / mysql2 bundle cleanly under `nodejs_compat`.
# NO_MINIFY keeps wasm-bindgen identifiers unmangled so jspi-patch.mjs can
# find its anchor patterns by name.
command = "cargo install -q worker-build && ESBUILD_BIN=$PWD/scripts/esbuild-wrapper.sh NO_MINIFY=1 worker-build --release && node jspi-patch.mjs"

# ─── KV namespaces ─────────────────────────────────────────────────────
# Create these via `wrangler kv namespace create SESSIONS` and paste the
# returned id. The "APP" namespace is only consulted if APP_DO is absent.
[[kv_namespaces]]
binding = "SESSIONS"
id = "223c20eab7a6480d9fed2d75d4914c76"

[[kv_namespaces]]
binding = "APP"
id = "e58be0bb9afc4909b064a75e689831a7"

# ─── Durable Object (strong-consistency application scope) ────────────
[[durable_objects.bindings]]
name = "APP_DO"
class_name = "ApplicationScopeDO"

[[migrations]]
tag = "v1"
new_classes = ["ApplicationScopeDO"]

# ─── Hyperdrive (Postgres / MySQL) ────────────────────────────────────
# Hyperdrive proxies a remote Postgres or MySQL database through
# Cloudflare's edge connection pool. Create a config with:
#
#   wrangler hyperdrive create rustcfml-pg    --connection-string="postgres://user:pass@host:5432/db"
#   wrangler hyperdrive create rustcfml-mysql --connection-string="mysql://user:pass@host:3306/db"
#
# Then paste the returned ids below. CFML sees these as
# `<cfquery datasource="HYPERDRIVE_PG">` / `"HYPERDRIVE_MYSQL"`. Either
# binding is optional — declare only the engines you actually use. The JS
# shim sniffs the connectionString prefix to pick postgres.js vs mysql2.
#
[[hyperdrive]]
binding = "HYPERDRIVE_PG"
id = "0c6b5a5177464a6fa8b3df0880c39e69"

# [[hyperdrive]]
# binding = "HYPERDRIVE_MYSQL"
# id = "<paste-id-here>"

# ─── Cron triggers ─────────────────────────────────────────────────────
# Sweep expired KV sessions on a schedule. Tighten this to match your
# session timeout if you care about prompt cleanup; loosen it (or remove
# the trigger entirely) if you don't.
[triggers]
crons = ["*/30 * * * *"]
