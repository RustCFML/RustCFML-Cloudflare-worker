name = "rustcfml-worker"
# Custom JSPI shim wraps the worker-build wasm export with WebAssembly.promising
# and supplies the cfml_jspi_d1_query Suspending import so <cfquery> against D1
# bindings works. If you remove this and revert to "build/worker/shim.mjs",
# cfquery will return a runtime error pointing back here.
main = "src/jspi-shim.mjs"
compatibility_date = "2024-09-23"

[build]
command = "cargo install -q worker-build && worker-build --release"

# ─────────────────────────────────────────────────────────────────────────────
# Optional bindings — cfml-worker reads these by id and wires them into
# the corresponding CFML scopes. Uncomment and fill in once you've created
# the resources with `wrangler kv:namespace create SESSIONS` etc.
# ─────────────────────────────────────────────────────────────────────────────

# Session scope persists across isolates when this binding is present.
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "..."

# Application scope persists across isolates when this binding is present.
# Note that strong consistency for `onApplicationStart` is best-effort —
# move to a Durable Object if you need single-writer semantics.
# [[kv_namespaces]]
# binding = "APPLICATION"
# id = "..."

# D1 datasource for <cfquery datasource="main"> in cfml/d1.cfm. The binding
# name on env (here "MAIN") is matched case-insensitively against the
# datasource string from CFML. Create + populate the DB with:
#   wrangler d1 create rustcfml-worker
#   wrangler d1 execute MAIN --command="CREATE TABLE things (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL, created_at TEXT DEFAULT CURRENT_TIMESTAMP)"
# Then drop the returned database_id into the line below and uncomment.
# [[d1_databases]]
# binding = "MAIN"
# database_name = "rustcfml-worker"
# database_id = "..."
