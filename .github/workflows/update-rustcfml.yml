name: Update RustCFML

# Watches the upstream RustCFML repo for new releases and, when a newer tag
# is available, bumps the `cfml-worker` dependency, verifies the worker still
# compiles, and opens a pull request for review.
#
# Mechanism: scheduled poll (no changes or access required in the RustCFML repo).
# You can also trigger it by hand from the Actions tab (workflow_dispatch).

on:
  schedule:
    # TEMPORARY: every 5 minutes for testing. Change back to a sane cadence
    # (e.g. "0 */6 * * *" for every 6 hours) once verified.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: RustCFML/RustCFML

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use GH_PAT if set (needed when the org blocks GITHUB_TOKEN from
          # opening PRs); otherwise fall back to the built-in token. This token
          # is what `git push` will authenticate with.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Determine current and latest RustCFML versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Tag currently pinned in Cargo.toml, e.g. tag = "v0.380.0"
          current="$(grep -oP 'cfml-worker\s*=.*tag\s*=\s*"\K[^"]+' Cargo.toml)"
          echo "Current: $current"

          # Highest semver tag upstream. Fetch the 100 most recent tags and
          # sort with `sort -V` so we pick the true latest regardless of API order.
          latest="$(gh api "repos/${UPSTREAM_REPO}/tags?per_page=100" \
            --jq '.[].name' | sort -V | tail -n1)"
          echo "Latest:  $latest"

          if [ -z "$latest" ]; then
            echo "Could not resolve a latest tag from ${UPSTREAM_REPO}." >&2
            exit 1
          fi

          {
            echo "current=$current"
            echo "latest=$latest"
          } >> "$GITHUB_OUTPUT"

          # Only proceed if `latest` is strictly newer than `current`.
          if [ "$current" = "$latest" ] || \
             [ "$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -n1)" != "$latest" ]; then
            echo "Already on the latest version ($current). Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust (wasm32 target)
        if: steps.versions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        if: steps.versions.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Bump dependency and verify build
        if: steps.versions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          current="${{ steps.versions.outputs.current }}"
          latest="${{ steps.versions.outputs.latest }}"

          # Update the tag in Cargo.toml and refresh Cargo.lock to the exact tag.
          sed -i "s|tag = \"${current}\"|tag = \"${latest}\"|" Cargo.toml
          cargo update -p cfml-worker --precise "${latest}"

          # Fail the run (and skip the PR) if the new version doesn't compile.
          cargo build --release --target wasm32-unknown-unknown

      - name: Open pull request
        if: steps.versions.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.versions.outputs.current }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          branch="deps/rustcfml-${LATEST}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Idempotent: if the branch/PR already exists, don't recreate it.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists upstream — PR already open. Skipping."
            exit 0
          fi

          git checkout -b "$branch"
          git add Cargo.toml Cargo.lock
          git commit -m "Upgrade cfml-worker to RustCFML ${LATEST}"
          git push origin "$branch"

          gh pr create \
            --title "Upgrade cfml-worker to RustCFML ${LATEST}" \
            --body "Automated dependency bump: \`${CURRENT}\` → \`${LATEST}\`.

          Upstream: https://github.com/${UPSTREAM_REPO}/releases/tag/${LATEST}

          The worker was compiled against the new version in CI (\`cargo build --release --target wasm32-unknown-unknown\`) before this PR was opened." \
            --base main \
            --head "$branch"
